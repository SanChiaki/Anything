<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything - SanChiaki's Archive</title>
    <style>
        :root {
            /* 牛皮纸主题色 */
            --bg-primary: #f4e8d1;       /* 主背景：淡牛皮纸色 */
            --bg-secondary: #e6d5c3;     /* 侧边栏/头部背景 */
            --bg-card: #f0e4d0;          /* 卡片背景 */
            --bg-code: #dfcdb7;          /* 代码块背景 */
            --text-primary: #4a4a4a;     /* 主文字：深灰褐色 */
            --text-secondary: #7a7060;   /* 副文字 */
            --accent: #8b5a2b;           /* 强调色：深棕色 */
            --accent-hover: #6d4c1d;
            --border: #d4c4b0;           /* 边框颜色 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s;
        }
        
        header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        header h1 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--accent); 
            letter-spacing: 0.02em;
        }
        header a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; font-weight: 500; }
        header a:hover { color: var(--accent); }

        .container { display: flex; flex: 1; overflow-y: auto; }
        
        aside {
            width: 300px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            position: sticky;
            top: 0;
            align-self: flex-start;
            display: flex;
            flex-direction: column;
        }
        aside h2 { 
            padding: 1rem; 
            font-size: 0.875rem; 
            text-transform: uppercase; 
            color: var(--text-secondary); 
            letter-spacing: 0.1em; 
            border-bottom: 1px solid var(--border);
        }
        
        .article-item {
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .article-item:hover { background: var(--bg-primary); }
        .article-item.active { 
            background: var(--bg-card); 
            border-left: 4px solid var(--accent); 
        }
        .article-item h3 { 
            font-size: 0.95rem; 
            margin-bottom: 0.5rem; 
            line-height: 1.4; 
            font-weight: 600; 
            color: var(--text-primary);
        }
        .article-item .meta { 
            font-size: 0.8rem; 
            color: var(--text-secondary); 
            display: flex; 
            justify-content: space-between; 
            opacity: 0.8;
        }

        main { flex: 1; padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
        .loading { text-align: center; color: var(--text-secondary); padding: 4rem 0; }
        
        /* Markdown Styles - 适配牛皮纸主题 */
        #content {
            font-size: 1.05rem;
            line-height: 1.7;
        }
        #content h1 { margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); color: var(--accent); font-size: 2rem; }
        #content h2 { margin: 2.5rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); color: var(--accent); }
        #content h3 { margin: 2rem 0 1rem; color: var(--text-primary); }
        #content p { margin-bottom: 1rem; line-height: 1.7; }
        #content code { background: var(--bg-code); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #4a3b32; }
        #content pre { background: var(--bg-code); padding: 1.2rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid var(--border); }
        #content pre code { background: transparent; color: var(--text-primary); padding: 0; }
        #content blockquote { border-left: 4px solid var(--accent); padding-left: 1rem; color: var(--text-secondary); margin: 1.5rem 0; font-style: italic; background: rgba(255,255,255,0.2); padding: 1rem; border-radius: 0 4px 4px 0; }
        #content ul { padding-left: 1.5rem; margin-bottom: 1rem; }
        #content li { margin-bottom: 0.5rem; }
        #content hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; opacity: 0.6; }
        #content a { color: var(--accent); text-decoration: underline; text-decoration-color: transparent; transition: 0.2s; }
        #content a:hover { text-decoration-color: var(--accent); }
        #content strong { color: var(--accent); }
        #content table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; background: rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; }
        #content th, #content td { border: 1px solid var(--border); padding: 0.75rem; text-align: left; }
        #content th { background: var(--bg-card); color: var(--text-primary); font-weight: 600; }

        @media (max-width: 768px) {
            aside { width: 100%; min-height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); }
            main { padding: 1rem; }
            #content h1 { font-size: 1.6rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>📑 Anything</h1>
        <a href="https://github.com/SanChiaki/Anything" target="_blank">GitHub Repository</a>
    </header>
    <div class="container">
        <aside>
            <h2>Articles List</h2>
            <div id="article-list">
                <div class="loading">Loading...</div>
            </div>
        </aside>
        <main id="content">
            <div class="loading">Select an article to read</div>
        </main>
    </div>
    <script>
        let allArticles = [];

        // 从 URL 获取 article 参数
        function getArticleFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('article');
        }

        // 更新 URL（不刷新页面）
        function updateURL(path) {
            const url = new URL(window.location);
            if (path) {
                url.searchParams.set('article', path);
            } else {
                url.searchParams.delete('article');
            }
            history.replaceState({}, '', url);
        }

        // 监听浏览器前进/后退
        window.addEventListener('popstate', () => {
            const target = getArticleFromURL();
            if (target) {
                const article = allArticles.find(a => a.path === target);
                if (article) {
                    highlightArticle(target);
                    loadArticle(article.path, article.title, false);
                }
            }
        });

        function highlightArticle(path) {
            document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.article-item').forEach(el => {
                if (el.dataset.path === path) el.classList.add('active');
            });
        }

        async function init() {
            const listContainer = document.getElementById('article-list');
            
            try {
                const res = await fetch('./articles.json');
                allArticles = await res.json();
                
                listContainer.innerHTML = '';
                allArticles.forEach((article, index) => {
                    const item = document.createElement('div');
                    item.className = 'article-item';
                    item.dataset.path = article.path;
                    item.innerHTML = `
                        <h3>${article.title}</h3>
                        <div class="meta">
                            <span>${article.author}</span>
                            <span>${article.date}</span>
                        </div>
                    `;
                    item.onclick = () => {
                        highlightArticle(article.path);
                        loadArticle(article.path, article.title, true);
                    };
                    listContainer.appendChild(item);
                });
                
                // 检查 URL 是否指定了文章
                const target = getArticleFromURL();
                if (target) {
                    const article = allArticles.find(a => a.path === target);
                    if (article) {
                        highlightArticle(target);
                        loadArticle(article.path, article.title, false);
                        return;
                    }
                }
                
                // 默认加载第一篇文章
                if (allArticles.length > 0 && allArticles[0].path) {
                    highlightArticle(allArticles[0].path);
                    loadArticle(allArticles[0].path, allArticles[0].title, false);
                }
            } catch (err) {
                listContainer.innerHTML = '<div class="loading">Failed to load article list.</div>';
                console.error(err);
            }
        }

        async function loadArticle(path, title, updateUrl = true) {
            const contentContainer = document.getElementById('content');
            contentContainer.innerHTML = '<div class="loading">Loading content...</div>';
            try {
                const res = await fetch('./' + path);
                const text = await res.text();
                contentContainer.innerHTML = marked.parse(text);
                document.querySelector('.container').scrollTop = 0;
                if (updateUrl) updateURL(path);
            } catch (err) {
                contentContainer.innerHTML = '<div class="loading">Failed to load content.</div>';
                console.error(err);
            }
        }

        init();
    </script>
</body>
</html>
