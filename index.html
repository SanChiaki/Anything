<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anything - SanChiaki's Archive</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --text-primary: #e8e8f0;
            --text-secondary: #9898b0;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --border: #2a2a3e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; background: linear-gradient(to right, #a78bfa, #60a5fa); -webkit-background-clip: text; color: transparent; }
        header a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
        header a:hover { color: var(--text-primary); }

        .container { display: flex; flex: 1; overflow: hidden; }
        aside {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        aside h2 { padding: 1rem; font-size: 0.875rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
        .article-item {
            padding: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border);
        }
        .article-item:hover { background: var(--bg-card); }
        .article-item.active { background: var(--bg-card); border-left: 3px solid var(--accent); }
        .article-item h3 { font-size: 1rem; margin-bottom: 0.5rem; line-height: 1.4; }
        .article-item .meta { font-size: 0.8rem; color: var(--text-secondary); display: flex; justify-content: space-between; }

        main { flex: 1; overflow-y: auto; padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
        .loading { text-align: center; color: var(--text-secondary); padding: 4rem 0; }
        
        /* Markdown Styles */
        #content h1 { margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        #content h2 { margin: 2rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        #content p { margin-bottom: 1rem; line-height: 1.7; }
        #content code { background: var(--bg-card); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        #content pre { background: var(--bg-card); padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; }
        #content blockquote { border-left: 4px solid var(--accent); padding-left: 1rem; color: var(--text-secondary); margin: 1rem 0; font-style: italic; }
        #content ul { padding-left: 1.5rem; margin-bottom: 1rem; }
        #content li { margin-bottom: 0.5rem; }
        #content hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            aside { width: 100%; height: 30%; border-right: none; border-bottom: 1px solid var(--border); }
            main { height: 70%; padding: 1rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>Anything Archive</h1>
        <a href="https://github.com/SanChiaki/Anything" target="_blank">GitHub Repository</a>
    </header>
    <div class="container">
        <aside>
            <h2>Articles</h2>
            <div id="article-list">
                <div class="loading">Loading...</div>
            </div>
        </aside>
        <main id="content">
            <div class="loading">Select an article to read</div>
        </main>
    </div>
    <script>
        async function init() {
            const listContainer = document.getElementById('article-list');
            const contentContainer = document.getElementById('content');
            
            try {
                const res = await fetch('./articles.json');
                const articles = await res.json();
                
                listContainer.innerHTML = '';
                articles.forEach((article, index) => {
                    const item = document.createElement('div');
                    item.className = 'article-item';
                    item.innerHTML = `
                        <h3>${article.title}</h3>
                        <div class="meta">
                            <span>${article.author}</span>
                            <span>${article.date}</span>
                        </div>
                    `;
                    item.onclick = () => {
                        document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        loadArticle(article.path, article.title);
                    };
                    listContainer.appendChild(item);
                    
                    if (index === 0) item.click(); // Auto-load first article
                });
            } catch (err) {
                listContainer.innerHTML = '<div class="loading">Failed to load article list.</div>';
                console.error(err);
            }
        }

        async function loadArticle(path, title) {
            const contentContainer = document.getElementById('content');
            contentContainer.innerHTML = '<div class="loading">Loading content...</div>';
            try {
                const res = await fetch('./' + path);
                const text = await res.text();
                contentContainer.innerHTML = `<h1>${title}</h1><div id="md-body"></div>`;
                document.getElementById('md-body').innerHTML = marked.parse(text);
            } catch (err) {
                contentContainer.innerHTML = '<div class="loading">Failed to load content.</div>';
                console.error(err);
            }
        }

        init();
    </script>
</body>
</html>
